<!DOCTYPE html>

<html lang="ja">

<head>

    <meta charset="utf-8">

    <title>CamApp</title>

    <meta name="viewport" content="width=device-width,
                 initial-scale=1,
                 viewport-fit=cover">

    <meta name="theme-color" content="#111111">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta name="apple-mobile-web-app-title" content="CamApp">

    <meta name="mobile-web-app-capable" content="yes">

    <meta name="color-scheme" content="dark light">

    <link rel="manifest" href="manifest.json">

    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

    <link rel="icon" href="favicon.ico">

    <link rel="stylesheet" href="css/main.css">

</head>

<body>

    <div id="app">

        <header id="appHeader">

            <button id="menuButton">
                ☰
            </button>

            <div id="title">

                CamApp

            </div>

            <button id="settingsButton">

                ⚙

            </button>

        </header>

        <main id="content">

            <section id="cameraPage">

                <video id="camera" autoplay playsinline muted>
                </video>

                <details id="debugPanel">

                    <summary>

                        Debug

                    </summary>

                    <pre id="debugOutput">

                    Loading...

                        </pre>

                </details>


                <canvas id="captureCanvas" hidden>
                </canvas>

            </section>

        </main>

        <footer id="toolbar">

            <button id="switchCamera">

                ⇆

            </button>

            <button id="captureButton">

                📷

            </button>

            <button id="burstButton">

                Burst

            </button>

            <button id="debugButton">

                Debug

            </button>

        </footer>

    </div>

    <div id="dialogContainer"></div>

    <div id="loadingContainer"></div>

    <div id="toastContainer"></div>

    <script type="module" src="js/app.js">
    </script>

</body>

</html>
